<div style="display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;">
  <span style="flex:0 0 110px;color:var(--text-dim);white-space:nowrap;">{{ o.recorded_at[:16] }}</span>
  <span style="flex:0 0 120px;font-weight:500;color:var(--fg);">{{ o.outcome }}</span>
  <span style="flex:1;color:var(--text-dim);">{{ o.notes or "" }}</span>
</div>

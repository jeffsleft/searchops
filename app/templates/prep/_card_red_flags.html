<div class="card prep-card">
  <div class="card-head">
    <h3>Watch for / red flags</h3>
    <span class="dim mono" style="font-size:11px">{{ red_flags|length }}</span>
  </div>
  <div class="card-body" style="padding:8px 14px 12px">
    {% for f in red_flags %}
      <div class="prep-flag-row">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M6.5 1L8 4h4.5l-3.6 2.7 1.4 4.3L6.5 8.4l-3.8 2.6 1.4-4.3L0 4h4.5L6.5 1z"/></svg>
        <span style="flex:1">{{ f.text }}</span>
        <button class="btn btn-sm btn-ghost btn-icon" hx-delete="/prep/red-flags/{{ f.id }}" hx-target="closest .prep-card" hx-swap="outerHTML" title="Remove">×</button>
      </div>
    {% endfor %}
    <form class="prep-add-row" {% if not red_flags %}style="margin-top:0"{% else %}style="margin-top:10px"{% endif %} hx-post="/prep/sessions/{{ active_session.id }}/red-flags" hx-target="closest .prep-card" hx-swap="outerHTML">
      <input class="input" placeholder="Add a signal to listen for…" name="text" autocomplete="off"/>
    </form>
  </div>
</div>

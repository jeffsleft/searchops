<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Recruiting Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-base); }
    .login-wrap { width:100%; max-width:360px; padding:24px; }
    .login-head { text-align:center; margin-bottom:32px; }
    .login-logo { width:48px; height:48px; border-radius:var(--radius-lg); background:var(--accent); color:#fff; font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-family:var(--font-mono); }
    .login-title { font-size:17px; font-weight:600; letter-spacing:-.015em; }
    .login-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-head">
      <div class="login-logo">JB</div>
      <div class="login-title">Recruiting Engine</div>
      <div class="login-sub">Beaumont · 2026</div>
    </div>

    <div class="card">
      <div class="card-body" style="padding:20px;">
        {% if error %}
        <div style="background:var(--rust-soft);border:1px solid var(--rust);border-radius:var(--radius);padding:8px 12px;font-size:12.5px;color:var(--text);margin-bottom:14px;">
          {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login" style="display:flex;flex-direction:column;gap:12px;">
          <div>
            <label class="dim" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:block;margin-bottom:6px;">Password</label>
            <input type="password" name="password" autofocus required class="input">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
